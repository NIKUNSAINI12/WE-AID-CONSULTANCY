<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Join Us - We Aid Consultancy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f6f4f1] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl p-10 border border-white">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2b4c7e] mb-2">Create Account</h1>
            <p class="text-slate-500 text-sm">Join our community for expert insights</p>
        </div>

        <form action="/signup" method="POST" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Full Name</label>
                <input type="text" name="name" required placeholder="John Doe" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-[#2b4c7e] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Email</label>
                <input type="email" name="email" required placeholder="name@email.com" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-[#2b4c7e] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Phone Number</label>
                <input type="text" name="phone" required placeholder="+91 00000 00000" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-[#2b4c7e] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Profession (Optional)</label>
                <input type="text" name="profession" placeholder="e.g. Accountant" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-[#2b4c7e] transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-[#2b4c7e] transition-all">
            </div>

            <button type="submit" class="w-full bg-[#2b4c7e] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-[#1a3a63] transition-all transform hover:-translate-y-1 mt-4">
                Create Account
            </button>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-500">Already have an account? <a href="/login" class="font-bold text-[#2b4c7e]">Login</a></p>
            <a href="/" class="block mt-4 text-xs font-bold text-slate-400 hover:text-[#2b4c7e] transition-colors">Back to Home</a>
        </div>
    </div>
</body>
</html>
