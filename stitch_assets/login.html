<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login - We Aid Consultancy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Manrope', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f6f4f1] min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl p-10 border border-white">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-[#2b4c7e] mb-2">Welcome Back</h1>
            <p class="text-slate-500 text-sm">Access your consultancy dashboard</p>
        </div>

        {% if request.query_params.get('signup') == 'success' %}
        <div class="bg-green-50 text-green-600 p-4 rounded-xl text-sm mb-6 font-bold border border-green-100 flex items-center gap-2">
            <span class="material-symbols-outlined text-base">check_circle</span>
            Account created! Please sign in.
        </div>
        {% endif %}

        {% if error %}
        <div class="bg-red-50 text-red-500 p-4 rounded-xl text-sm mb-6 font-bold border border-red-100">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Email Address</label>
                <input type="email" name="email" required placeholder="name@company.com" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-[#2b4c7e] focus:border-transparent transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••" 
                    class="w-full bg-white/50 border-slate-200 rounded-2xl px-6 py-4 focus:ring-2 focus:ring-[#2b4c7e] focus:border-transparent transition-all">
            </div>

            <button type="submit" class="w-full bg-[#2b4c7e] text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-[#1a3a63] transition-all transform hover:-translate-y-1">
                Sign In
            </button>
        </form>

        <div class="mt-8 text-center text-sm">
            <p class="text-slate-500 mb-2">Don't have an account? <a href="/signup" class="font-bold text-[#2b4c7e] hover:underline">Register Now</a></p>
            <a href="/" class="text-xs font-bold text-slate-400 hover:text-[#2b4c7e] transition-colors">Back to Home</a>
        </div>
    </div>
</body>
</html>
