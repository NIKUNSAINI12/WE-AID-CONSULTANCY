<!-- Floating Sticky Inquiry Tab -->
<style>
    html { overflow-x: hidden; }
    body { overflow-x: hidden; position: relative; }
    .floating-inquiry-tab {
        position: fixed;
        right: 0;
        top: 50%;
        transform: rotate(-90deg) translateY(-100%);
        transform-origin: top right;
        z-index: 55;
        transition: all 0.3s cubic;
        cursor: pointer;
        padding: 1.25rem 2rem;
    }
    @media (max-width: 640px) {
        .floating-inquiry-tab {
            padding: 0.75rem 1.5rem;
        }
    }
    .date-pill.active { background-color: #2b4c7e; color: white; border-color: #2b4c7e; }
    .time-slot.active { background-color: #cca43b; color: white; border-color: #cca43b; }
    .step-content { display: none; }
    .step-content.active { display: block; }
    .inquiry-only { display: none; }
</style>

<button onclick="openModal('General Inquiry', 'inquiry')" class="floating-inquiry-tab flex items-center gap-3 bg-[#2b4c7e] text-white rounded-t-3xl shadow-2xl hover:bg-[#1a3a63] border-x border-t border-white/20 whitespace-nowrap group">
    <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">interactive_space</span>
    <span class="font-bold tracking-wider text-xs sm:text-sm uppercase">Consult an Expert</span>
    <div class="absolute -top-1 -right-1 flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-gold opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-gold"></span>
    </div>
</button>

<!-- Registration Modal Container -->
<div id="serviceModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl p-8 overflow-y-auto max-h-[95vh] border border-white">
        <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 transition-colors">
            <span class="material-symbols-outlined">close</span>
        </button>

        <!-- Progress Indicator (Only for consultation) -->
        <div id="progressContainer" class="flex items-center justify-center gap-4 mb-8">
            <div id="stepDot1" class="w-12 h-2 rounded-full bg-primary transition-all"></div>
            <div id="stepDot2" class="w-12 h-2 rounded-full bg-slate-100 transition-all"></div>
        </div>

        <form id="bookingForm" action="/register-service" method="POST" class="space-y-6">
            <!-- Hidden Fields for Booking -->
            <input type="hidden" name="meeting_date" id="selectedDateInput">
            <input type="hidden" name="meeting_time" id="selectedTimeInput">

            <!-- Step 1: Schedule (Consultation Mode) -->
            <div id="step1" class="step-content">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-[#2b4c7e] mb-2">Schedule Your Consultation</h2>
                    <p class="text-slate-500 text-sm">Select a convenient date and time for our Google Meet session.</p>
                </div>

                <!-- Date Selection -->
                <div class="mb-8">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Select Date</label>
                    <div id="dateContainer" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                        <!-- Dates populated by JS -->
                    </div>
                </div>

                <!-- Time Selection -->
                <div class="mb-10">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 ml-1">Select Time Slot (IST)</label>
                    <div id="timeContainer" class="grid grid-cols-3 sm:grid-cols-4 gap-3">
                        <!-- Times populated by JS -->
                    </div>
                </div>

                <div class="flex justify-center">
                    <button type="button" onclick="goToStep(2)" id="nextBtn" disabled class="px-12 py-4 bg-primary text-white font-bold rounded-2xl shadow-xl opacity-50 cursor-not-allowed transition-all hover:scale-105 active:scale-95">
                        Continue to Details
                    </button>
                </div>
            </div>

            <!-- Step 2: User Details (Both Modes) -->
            <div id="step2" class="step-content active">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-extrabold text-[#2b4c7e] mb-2" id="step2Title">Final Confirmation</h2>
                    <p class="text-slate-500 text-sm" id="step2Subtitle">We'll send the Google Meet invitation link to this email.</p>
                </div>

                {% if user %}
                <div class="bg-blue-50 border border-blue-100 rounded-3xl p-6 mb-6 flex items-center gap-4">
                    <div class="size-16 rounded-2xl bg-primary text-white flex items-center justify-center">
                        <span class="material-symbols-outlined text-3xl">account_circle</span>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">Confirming for</p>
                        <p class="text-xl font-bold text-primary">{{ user.name }}</p>
                        <p class="text-sm text-slate-500">{{ user.email }}</p>
                    </div>
                    <input type="hidden" name="name" value="{{ user.name }}">
                    <input type="hidden" name="email" value="{{ user.email }}">
                </div>
                {% else %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Full Name</label>
                        <input type="text" name="name" required placeholder="John Doe" class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Email Address</label>
                        <input type="email" name="email" required placeholder="john@email.com" class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all">
                    </div>
                </div>
                {% endif %}

                <!-- Service Details (Modified to include Dropdown) -->
                <div class="space-y-4 mb-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Service Required</label>
                            <div class="relative">
                                <select name="service_type" id="serviceTypeInput" class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all appearance-none font-bold text-slate-700">
                                    <option value="Income Tax Filing">Income Tax Filing</option>
                                    <option value="GST Registration">GST Registration</option>
                                    <option value="TDS Filing">TDS Filing</option>
                                    <option value="Accounting">Accounting</option>
                                    <option value="Startup Setup">Startup Setup</option>
                                    <option value="ROC Compliance">ROC Compliance</option>
                                    <option value="Business Advisory">Business Advisory</option>
                                    <option value="Tax Planning">Tax Planning</option>
                                    <option value="General Inquiry">General Inquiry</option>
                                    <option value="Free Consultation">Free Consultation</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                                    <span class="material-symbols-outlined">expand_more</span>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Phone Number</label>
                            <input type="text" name="phone" id="phoneInput" required value="{{ user.phone if user and user.phone else '' }}" placeholder="+91 00000 00000" class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">Profession</label>
                            <input type="text" name="profession" placeholder="e.g. Creator, SME Owner" class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 ml-1">How can we help you?</label>
                        <textarea name="description" rows="2" placeholder="Tell us about your requirements..." class="w-full bg-slate-50 border-slate-100 rounded-2xl px-6 py-3 focus:ring-2 focus:ring-primary transition-all"></textarea>
                    </div>
                </div>

                <div class="space-y-4">
                    <button type="submit" id="submitBtn" class="w-full bg-primary text-white font-bold py-5 rounded-2xl shadow-xl hover:bg-primary-light transition-all transform hover:-translate-y-1">
                        Book Consultation & Get GMeet Link
                    </button>
                    <button type="button" id="backBtn" onclick="goToStep(1)" class="w-full text-slate-400 font-bold text-sm hover:text-primary transition-colors py-2">
                        ← Change Date/Time
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const slots = ["10:00 AM", "11:00 AM", "12:00 PM", "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM"];
    let selectedDate = null;
    let selectedTime = null;
    let currentMode = 'consultation';

    function openModal(serviceName = 'Business Advisory', mode = 'inquiry') {
        const modal = document.getElementById('serviceModal');
        const progress = document.getElementById('progressContainer');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');
        const title = document.getElementById('step2Title');
        const subtitle = document.getElementById('step2Subtitle');
        
        currentMode = mode;
        
        // Handle dropdown pre-selection
        const select = document.getElementById('serviceTypeInput');
        if (select) select.value = serviceName;
        
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        if (mode === 'consultation') {
            progress.classList.remove('hidden');
            backBtn.classList.remove('hidden');
            title.innerText = "Final Confirmation";
            subtitle.innerText = "We'll send the Google Meet invitation link to this email.";
            submitBtn.innerText = "Book Consultation & Get GMeet Link";
            goToStep(1);
            initCalendar();
        } else {
            progress.classList.add('hidden');
            backBtn.classList.add('hidden');
            title.innerText = "Expert Assistance";
            subtitle.innerText = "Fill in your details and our team will get back to you shortly.";
            submitBtn.innerText = "Submit Inquiry";
            
            // Clear meeting info
            document.getElementById('selectedDateInput').value = "";
            document.getElementById('selectedTimeInput').value = "";
            
            goToStep(2);
        }
    }

    function closeModal() {
        document.getElementById('serviceModal').classList.add('hidden');
        document.body.style.overflow = 'auto';
    }

    function initCalendar() {
        const container = document.getElementById('dateContainer');
        const timeContainer = document.getElementById('timeContainer');
        container.innerHTML = '';
        timeContainer.innerHTML = '';
        
        // Generate next 7 days
        for (let i = 0; i < 7; i++) {
            const date = new Date();
            date.setDate(date.getDate() + i);
            if (date.getDay() === 0) continue; // Skip Sundays

            const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
            const dayNum = date.getDate();
            const dateStr = date.toISOString().split('T')[0];

            const pill = document.createElement('button');
            pill.type = "button";
            pill.className = `date-pill flex-shrink-0 flex flex-col items-center justify-center size-20 rounded-2xl border-2 border-slate-100 hover:border-primary transition-all font-bold`;
            pill.innerHTML = `<span class="text-[10px] uppercase opacity-60">${dayName}</span><span class="text-xl">${dayNum}</span>`;
            pill.onclick = () => selectDate(pill, dateStr);
            container.appendChild(pill);
        }

        // Generate Time Slots
        slots.forEach(time => {
            const slot = document.createElement('button');
            slot.type = "button";
            slot.className = `time-slot px-4 py-3 rounded-xl border-2 border-slate-50 bg-slate-50 text-xs font-bold hover:border-primary transition-all`;
            slot.innerText = time;
            slot.onclick = () => selectTime(slot, time);
            timeContainer.appendChild(slot);
        });
    }

    function selectDate(el, date) {
        document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        selectedDate = date;
        document.getElementById('selectedDateInput').value = date;
        validateStep1();
    }

    function selectTime(el, time) {
        document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        selectedTime = time;
        document.getElementById('selectedTimeInput').value = time;
        validateStep1();
    }

    function validateStep1() {
        const btn = document.getElementById('nextBtn');
        if (selectedDate && selectedTime) {
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
    }

    function goToStep(step) {
        document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
        document.getElementById(`step${step}`).classList.add('active');
        
        if (currentMode === 'consultation') {
            document.getElementById('stepDot1').className = step >= 1 ? 'w-12 h-2 rounded-full bg-primary transition-all' : 'w-12 h-2 rounded-full bg-slate-100 transition-all';
            document.getElementById('stepDot2').className = step >= 2 ? 'w-12 h-2 rounded-full bg-primary transition-all' : 'w-12 h-2 rounded-full bg-slate-100 transition-all';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('status') === 'success') {
            alert('🎉 Thank you! Your request has been received.');
        }
    });

    window.openModal = openModal;
</script>
